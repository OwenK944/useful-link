<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Useful QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            /* Prevents any pull-to-refresh or scrolling behaviors */
            overscroll-behavior: none; 
        }
        video {
            width: 100%;
            height: 100%;
            /* Fills the entire vertical screen like a native app */
            object-fit: cover; 
            pointer-events: none;
        }
    </style>
    
    <!-- Tracker: Replace 'YOURCODE' with your GoatCounter code -->
    <script data-goatcounter="https://owenk944.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

    <!-- Video visually autoplays instantly, completely silent -->
    <video id="rick" src="video.mp4" autoplay muted playsinline loop preload="auto"></video>

</body>
</html>
