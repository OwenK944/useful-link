<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            /* Prevents any pull-to-refresh or scrolling behaviors */
            overscroll-behavior: none; 
        }
        video {
            width: 100%;
            height: 100%;
            /* Fills the entire vertical screen like a native app */
            object-fit: cover; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Video visually autoplays instantly, muted -->
    <video id="rick" src="video.mp4" autoplay muted playsinline loop preload="auto"></video>

    <script>
        const vid = document.getElementById('rick');

        // The invisible trap: Unmutes on the very first physical interaction
        const triggerAudio = () => {
            vid.muted = false;
            // Clean up the listeners immediately after firing once
            document.removeEventListener('touchstart', triggerAudio);
            document.removeEventListener('click', triggerAudio);
        };

        // Bind to the entire document. Any tap or swipe triggers the audio.
        document.addEventListener('touchstart', triggerAudio, { once: true });
        document.addEventListener('click', triggerAudio, { once: true });
    </script>
</body>
</html>
