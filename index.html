<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps the 16:9 aspect ratio without cropping */
            background-color: #000000;
        }
        /* Full screen tap target overlay */
        .interaction-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .play-button::after {
            content: '';
            display: block;
            box-sizing: border-box;
            width: 0;
            height: 24px;
            border-color: transparent transparent transparent #000000;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            margin-left: 6px;
        }
        .overlay-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Overlay forces user interaction to safely unmute audio -->
        <div class="interaction-overlay" id="overlay">
            <div class="play-button"></div>
            <div class="overlay-text">Tap to Play</div>
        </div>

        <!-- Preload auto tells the browser to aggressively download the data immediately -->
        <video id="rickroll" preload="auto" autoplay muted playsinline loop>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const video = document.getElementById('rickroll');
        const overlay = document.getElementById('overlay');

        // Handle the tap/click anywhere to unmute and ensure playback
        overlay.addEventListener('click', () => {
            video.muted = false;
            video.play().catch(error => {
                console.log("Playback engine error handled:", error);
            });
            overlay.classList.add('hidden');
        });

        // Fail-safe: if the browser allowed completely unmuted autoplay (rare but possible)
        video.onplay = function() {
            if (!video.muted) {
                overlay.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
